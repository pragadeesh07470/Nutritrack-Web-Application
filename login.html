<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NutriTrack — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0A0F1E;
    --navy2: #111827;
    --card: #161D2E;
    --teal: #00D4AA;
    --teal2: #00B492;
    --amber: #F5A623;
    --white: #F0F4FF;
    --slate: #8892A4;
    --danger: #FF4D6D;
    --border: rgba(255,255,255,0.07);
    --glass: rgba(255,255,255,0.04);
  }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--navy);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }
  /* Animated background orbs */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb1 { width: 500px; height: 500px; background: var(--teal); top: -100px; left: -150px; animation-delay: 0s; }
  .orb2 { width: 400px; height: 400px; background: var(--amber); bottom: -80px; right: -100px; animation-delay: 3s; }
  .orb3 { width: 300px; height: 300px; background: #7C3AED; top: 40%; left: 60%; animation-delay: 6s; }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(30px, 20px) scale(1.08); }
  }

  .page-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    width: 100%;
    max-width: 980px;
    min-height: 580px;
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    position: relative;
    z-index: 1;
  }

  /* LEFT PANEL */
  .left-panel {
    background: linear-gradient(145deg, #0D1627 0%, #0A1428 100%);
    padding: 56px 48px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .left-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 20% 80%, rgba(0,212,170,0.12) 0%, transparent 60%);
  }
  .brand { position: relative; z-index: 1; }
  .brand-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 48px;
  }
  .logo-ring {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 3px solid var(--teal);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .logo-ring::after {
    content: '';
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--teal);
    opacity: 0.3;
  }
  .logo-ring span {
    position: absolute;
    font-family: 'Sora', sans-serif;
    font-weight: 800;
    font-size: 15px;
    color: var(--teal);
  }
  .brand-name { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.3px; }
  .brand-name em { color: var(--teal); font-style: normal; }

  .panel-headline {
    font-family: 'Sora', sans-serif;
    font-weight: 800;
    font-size: 38px;
    line-height: 1.15;
    letter-spacing: -1px;
    color: var(--white);
    margin-bottom: 18px;
  }
  .panel-headline span { color: var(--teal); }
  .panel-sub { font-size: 14px; color: var(--slate); line-height: 1.7; max-width: 280px; }

  .stats-row {
    display: flex;
    gap: 20px;
    margin-top: 40px;
    position: relative; z-index: 1;
  }
  .stat-pill {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    flex: 1;
  }
  .stat-pill .val { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 22px; color: var(--teal); }
  .stat-pill .lbl { font-size: 11px; color: var(--slate); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Ring illustration */
  .ring-art {
    position: absolute;
    right: -60px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.08;
  }

  /* RIGHT PANEL — Form */
  .right-panel {
    background: var(--card);
    padding: 52px 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .form-header { margin-bottom: 32px; }
  .form-title { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 26px; letter-spacing: -0.5px; margin-bottom: 6px; }
  .form-sub { font-size: 13px; color: var(--slate); }

  .tabs {
    display: flex;
    gap: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }
  .tab {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--slate);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active { background: var(--teal); color: var(--navy); font-weight: 600; }

  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--slate); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,212,170,0.1); }
  .form-group input::placeholder { color: rgba(136,146,164,0.5); }

  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .remember-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .check-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--slate); cursor: pointer; }
  .check-label input[type="checkbox"] { accent-color: var(--teal); width: 15px; height: 15px; }
  .forgot-link { font-size: 13px; color: var(--teal); text-decoration: none; font-weight: 500; }
  .forgot-link:hover { text-decoration: underline; }

  .btn-primary {
    width: 100%;
    background: var(--teal);
    color: var(--navy);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Sora', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    letter-spacing: 0.2px;
  }
  .btn-primary:hover { background: var(--teal2); box-shadow: 0 8px 24px rgba(0,212,170,0.3); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--slate); font-size: 12px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .social-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-social {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px;
    color: var(--slate);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s, color 0.2s;
  }
  .btn-social:hover { background: rgba(255,255,255,0.08); color: var(--white); }

  .error-msg {
    background: rgba(255,77,109,0.1);
    border: 1px solid rgba(255,77,109,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--danger);
    margin-bottom: 16px;
    display: none;
  }

  /* Panel switching */
  #signup-fields { display: none; }

  @media (max-width: 700px) {
    .page-grid { grid-template-columns: 1fr; max-width: 420px; }
    .left-panel { display: none; }
    .right-panel { padding: 40px 28px; }
  }
</style>
</head>
<body>
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>
<div class="bg-orb orb3"></div>

<div class="page-grid">
  <!-- LEFT -->
  <div class="left-panel">
    <div class="brand">
      <div class="brand-logo">
        <div class="logo-ring"><span>N</span></div>
        <div class="brand-name"><em>Nutri</em>Track</div>
      </div>
      <div class="panel-headline">Your body.<br>Your <span>data.</span><br>Your progress.</div>
      <p class="panel-sub">Track every macro, every micro, every milestone. Built for people who take their health seriously.</p>
      <div class="stats-row">
        <div class="stat-pill"><div class="val">50+</div><div class="lbl">Nutrients tracked</div></div>
        <div class="stat-pill"><div class="val">100%</div><div class="lbl">Private & local</div></div>
      </div>
    </div>
    <!-- decorative ring -->
    <svg class="ring-art" width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="150" cy="150" r="130" stroke="white" stroke-width="25"/>
      <circle cx="150" cy="150" r="90" stroke="white" stroke-width="15"/>
      <circle cx="150" cy="150" r="50" stroke="white" stroke-width="10"/>
    </svg>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="form-header">
      <div class="form-title">Welcome back 👋</div>
      <div class="form-sub">Sign in or create your free account</div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login', this)">Sign In</button>
      <button class="tab" onclick="switchTab('signup', this)">Create Account</button>
    </div>

    <div id="error-msg" class="error-msg"></div>

    <form id="auth-form" onsubmit="handleAuth(event)">
      <!-- Sign up only fields -->
      <div id="signup-fields">
        <div class="input-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="fname" placeholder="Alex" autocomplete="given-name">
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lname" placeholder="Smith" autocomplete="family-name">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required minlength="6">
      </div>

      <div id="confirm-field" class="form-group" style="display:none;">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password">
      </div>

      <div class="remember-row" id="remember-row">
        <label class="check-label">
          <input type="checkbox" id="remember"> Keep me signed in
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary" id="submit-btn">Sign In</button>
    </form>

    <div class="divider">or continue with</div>
    <div class="social-btns">
      <button class="btn-social" onclick="socialAuth('Google')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="btn-social" onclick="socialAuth('Apple')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Apple
      </button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAJFHvvH7InFQIYy4uU6wAPl1qNxAeLnJE",
    authDomain: "nutritrack-905c4.firebaseapp.com",
    projectId: "nutritrack-905c4",
    storageBucket: "nutritrack-905c4.firebasestorage.app",
    messagingSenderId: "709613439860",
    appId: "1:709613439860:web:544f7dda688138a2fc7a21"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  let currentTab = 'login';

  window.switchTab = function(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const signupFields = document.getElementById('signup-fields');
    const confirmField = document.getElementById('confirm-field');
    const rememberRow  = document.getElementById('remember-row');
    const submitBtn    = document.getElementById('submit-btn');
    if (tab === 'signup') {
      signupFields.style.display = 'block';
      confirmField.style.display = 'block';
      rememberRow.style.display  = 'none';
      submitBtn.textContent = 'Create Account';
      document.querySelector('.form-title').textContent = 'Create account ✨';
    } else {
      signupFields.style.display = 'none';
      confirmField.style.display = 'none';
      rememberRow.style.display  = 'flex';
      submitBtn.textContent = 'Sign In';
      document.querySelector('.form-title').textContent = 'Welcome back 👋';
    }
    hideError();
  };

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error-msg').style.display = 'none';
  }

  window.handleAuth = async function(e) {
    e.preventDefault();
    hideError();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submit-btn');
    btn.textContent = 'Please wait…';
    btn.disabled    = true;

    try {
      if (currentTab === 'signup') {
        const fname = document.getElementById('fname').value.trim();
        const lname = document.getElementById('lname').value.trim();
        const confirm = document.getElementById('confirm-password').value;
        if (!fname || !lname) throw new Error('Please enter your full name.');
        if (password !== confirm) throw new Error('Passwords do not match.');

        const cred  = await createUserWithEmailAndPassword(auth, email, password);
        const token = await cred.user.getIdToken();

        // Register profile in backend
        await fetch('http://localhost:3001/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ fname, lname, email })
        });

        localStorage.setItem('nt_token', token);
        localStorage.setItem('nt_session', JSON.stringify({ email, fname, lname }));

      } else {
        const cred  = await signInWithEmailAndPassword(auth, email, password);
        const token = await cred.user.getIdToken();
        localStorage.setItem('nt_token', token);
        const parts = email.split('@')[0].split('.');
        const fname = parts[0].charAt(0).toUpperCase() + parts[0].slice(1);
        localStorage.setItem('nt_session', JSON.stringify({ email, fname, lname: '' }));
      }

      window.location.href = 'dashboard.html';

    } catch (err) {
      const msgs = {
        'auth/user-not-found':   'No account found. Please sign up.',
        'auth/wrong-password':   'Incorrect password. Try again.',
        'auth/email-already-in-use': 'Account already exists. Please sign in.',
        'auth/weak-password':    'Password must be at least 6 characters.',
        'auth/invalid-email':    'Invalid email address.',
        'auth/invalid-credential': 'Incorrect email or password.',
      };
      showError(msgs[err.code] || err.message);
      btn.textContent = currentTab === 'signup' ? 'Create Account' : 'Sign In';
      btn.disabled = false;
    }
  };

  window.socialAuth = function(provider) {
    showError(provider + ' login coming soon.');
  };
</script>
</body>
</html>
